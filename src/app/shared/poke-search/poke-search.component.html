<form (submit)="$event.preventDefault()">
  <div class="search-wrapper">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <circle cx="11" cy="11" r="8" />
      <path d="m21 21-4.35-4.35" />
    </svg>
    <input
      type="text"
      [ngModel]="searchTerm"
      (ngModelChange)="searchTerm = $event; onSearch()"
      [ngModelOptions]="{standalone: true}"
      placeholder="Buscar Pokémon..."
    />
    @if (searchTerm) {
      <button type="button" class="clear-btn" (click)="clearSearch()" aria-label="Limpar busca">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
    }
  </div>
</form>
